      #   run: |
      #     IMAGE=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.run_number }}
      #     sed -i "s|image: 716920920468.dkr.ecr.us-east-1.amazonaws.com/html-gitops-eks:latest|image: $IMAGE|g" k8s/dev/deployment.yaml
